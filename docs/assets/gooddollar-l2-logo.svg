<svg width="960" height="320" viewBox="0 0 960 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GoodDollar L2 logo</title>
  <desc id="desc">A green circular GoodDollar mark connected to an L2 chain ring, representing useful financial activity routed into universal basic income.</desc>
  <defs>
    <linearGradient id="bg" x1="72" y1="40" x2="888" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#071B14"/>
      <stop offset="0.52" stop-color="#0B2A1F"/>
      <stop offset="1" stop-color="#09251D"/>
    </linearGradient>
    <linearGradient id="good" x1="197" y1="69" x2="365" y2="237" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C9FF7A"/>
      <stop offset="0.45" stop-color="#48E087"/>
      <stop offset="1" stop-color="#14B86A"/>
    </linearGradient>
    <linearGradient id="l2" x1="352" y1="87" x2="488" y2="223" gradientUnits="userSpaceOnUse">
      <stop stop-color="#70F0FF"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="960" height="320" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="960" height="320" rx="48" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <circle cx="238" cy="160" r="92" fill="url(#good)"/>
    <circle cx="238" cy="160" r="64" fill="#082019" fill-opacity="0.18" stroke="#E8FFD1" stroke-width="6"/>
    <text x="238" y="184" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="68" font-weight="900" fill="#F7FFE9">G$</text>
    <path d="M318 160C338 120 376 96 421 96C483 96 532 145 532 207" stroke="url(#l2)" stroke-width="18" stroke-linecap="round"/>
    <path d="M318 160C338 200 376 224 421 224C464 224 502 199 520 163" stroke="#C9FF7A" stroke-width="18" stroke-linecap="round" opacity="0.94"/>
    <circle cx="532" cy="207" r="22" fill="#70F0FF"/>
    <circle cx="520" cy="163" r="18" fill="#C9FF7A"/>
  </g>
  <text x="594" y="133" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="58" font-weight="900" fill="#F7FFE9">GoodDollar L2</text>
  <text x="596" y="180" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="26" font-weight="700" fill="#A8F5CC">The UBI Chain</text>
  <text x="596" y="220" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20" font-weight="500" fill="#D6FBE6">Every useful transaction routes fees toward humans.</text>
</svg>
