<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620">
<style>
 text{font-family:Inter,Arial,sans-serif;fill:#111}.title{font-size:30px;font-weight:700}.sub{font-size:15px;fill:#555}.axis{font-size:12px;fill:#666}.bar{rx:10}.label{font-size:15px;font-weight:700}.small{font-size:12px;fill:#333}.gate{stroke:#c2185b;stroke-width:2;stroke-dasharray:5 5}.gateText{font-size:11px;fill:#c2185b;font-weight:700}
