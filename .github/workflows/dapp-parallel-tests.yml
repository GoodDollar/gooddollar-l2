name: Parallel Dapp Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: dapp-parallel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dapp-vitest:
    name: Dapp lane — ${{ matrix.lane }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: swap
          - lane: perps
          - lane: predict
          - lane: lend
          - lane: stable
          - lane: stocks
          - lane: portfolio-claim
          - lane: explore
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Run lane tests
        run: ./scripts/run-dapp-lane.sh "${{ matrix.lane }}"

  testnet-readiness:
    name: Testnet README generator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Regenerate clean testnet README
        run: python3 scripts/update-testnet-readme.py
      - name: Assert generated README is non-empty
        run: test -s docs/TESTNET_README.md && grep -q "GoodDollar L2 Testnet Readiness" docs/TESTNET_README.md

  onchain-receipt-matrix:
    name: Receipt lane — ${{ matrix.protocol }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        protocol: [GoodSwap, GoodPerps, GoodLend, GoodStable, GoodStocks, GoodPredict]
    steps:
      - uses: actions/checkout@v4
      - name: Validate stored integration receipt
        run: |
          file=".autobuilder/integration-receipts/${{ matrix.protocol }}.json"
          test -f "$file"
          python3 - <<'PY' "$file" "${{ matrix.protocol }}"
          import json, sys
          path, proto = sys.argv[1:]
          data = json.load(open(path))
          status = data.get('status')
          if status not in ('0x1', 1, '1'):
              raise SystemExit(f'{proto} receipt not successful: status={status!r}')
          print(f'{proto}: stored receipt status OK')
          PY
